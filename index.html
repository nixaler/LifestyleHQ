<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4a9eff">
<link rel="apple-touch-icon" href="/icon.svg">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f7;--card:#ffffff;--card2:#f0f0f4;
  --border:rgba(0,0,0,.08);
  --txt:#111111;--txt2:rgba(0,0,0,.55);--txt3:rgba(0,0,0,.28);
  --purple:#7B2FBE;--green:#028A48;--yellow:#c8a800;
  --blue:#0060A9;--red:#c43030;--orange:#D35B2C;
  --accent:#4a9eff;
  --inp-bg:rgba(0,0,0,.04);--dim:rgba(0,0,0,.06);--chk-border:rgba(0,0,0,.15);
}
[data-theme="dark"]{
  --bg:#0f0f13;--card:#1a1a22;--card2:#222229;
  --border:rgba(255,255,255,.08);
  --txt:#efefef;--txt2:rgba(255,255,255,.6);--txt3:rgba(255,255,255,.3);
  --inp-bg:rgba(255,255,255,.07);--dim:rgba(255,255,255,.08);--chk-border:rgba(255,255,255,.2);
}
html{background:var(--bg)}
body{background:var(--bg);font-family:'JetBrains Mono','Courier New',monospace;color:var(--txt);min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:var(--bg)}
.stripe{height:4px;display:flex;flex-shrink:0}
.hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--card)}
.hdr-title{font-size:16px;font-weight:700}
.hdr-sub{font-size:8px;color:var(--txt3);letter-spacing:3px;margin-top:2px}
.hdr-score{font-size:22px;font-weight:700;text-align:right}
.hdr-score-lbl{font-size:7px;color:var(--txt3);letter-spacing:1px}
#content{flex:1;padding:14px 16px;overflow-y:auto;padding-bottom:calc(72px + env(safe-area-inset-bottom,16px));background:var(--bg)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,8px);z-index:100}
.nav-btn{flex:1;padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border-top:2px solid transparent;background:transparent;border-left:none;border-right:none;border-bottom:none;color:var(--txt3);font-family:inherit}
.nav-btn.active{border-top-color:var(--accent);color:var(--accent)}
.nav-icon{font-size:15px}.nav-lbl{font-size:6.5px;letter-spacing:.5px}
.nav-btn.active .nav-lbl{font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.slbl{font-size:8px;letter-spacing:3px;color:var(--txt3);margin-bottom:10px;font-weight:700;display:block}
.pbar{background:var(--dim);border-radius:6px;overflow:hidden}
.pbar-fill{border-radius:6px;transition:width .4s}
.btn{border:none;border-radius:8px;padding:10px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px}
.btn-full{width:100%}
.inp{background:var(--inp-bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--txt);font-size:12px;font-family:inherit;outline:none;width:100%}
.inp:focus{border-color:var(--accent)}
select.inp option{background:var(--card);color:var(--txt)}
textarea.inp{resize:none;line-height:1.7}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:4px;background:var(--dim);outline:none;display:block;margin:4px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer}
.chk-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.chk-box{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid var(--chk-border);color:transparent;cursor:pointer}
.chk-box.done{background:var(--green);border-color:var(--green);color:#000}
.chk-lbl{font-size:12px;flex:1;cursor:pointer}
.chk-lbl.done{color:var(--txt3);text-decoration:line-through}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.pill{display:inline-block;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:700}
.exp-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.row-gap{margin-bottom:8px}
.del-btn{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;font-family:inherit;flex-shrink:0}
.edit-lnk{font-size:9px;color:var(--accent);cursor:pointer;letter-spacing:1px;font-weight:700;background:none;border:none;font-family:inherit}
.add-row{padding:8px 0;text-align:center;color:var(--txt3);font-size:10px;cursor:pointer;letter-spacing:1px;border-top:1px solid var(--border)}
.tag-btn{border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:10px;cursor:pointer;font-family:inherit;background:var(--dim);color:var(--txt3)}
.tag-btn.on{border-color:var(--accent);background:rgba(74,158,255,.1);color:var(--accent);font-weight:700}
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:rgba(0,0,0,.15);border-radius:2px;margin:0 auto 16px}
.ob-wrap{position:fixed;inset:0;z-index:300;overflow-y:auto;display:flex;flex-direction:column;background:linear-gradient(-45deg,#0d0d1f,#1a0d35,#0d1a35,#001525);background-size:400% 400%;animation:gradShift 18s ease infinite}
.ob-preset{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.ob-hab{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;cursor:pointer;font-family:inherit;background:var(--card);color:var(--txt2)}
.ob-hab.on{border-color:var(--green);background:rgba(2,138,72,.08);color:var(--green);font-weight:700}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;flex-shrink:0}
.color-swatch.on{border-color:#111}
.calc-hint{font-size:9px;color:var(--green);margin-top:3px;font-weight:700;min-height:13px}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotFloat{0%,100%{transform:translateY(0) scale(1);opacity:.65}50%{transform:translateY(-9px) scale(1.4);opacity:1}}
@keyframes logoPulse{0%,100%{text-shadow:0 0 20px rgba(255,255,255,.1)}50%{text-shadow:0 0 40px rgba(255,255,255,.35)}}
</style>
</head>
<body>
<div id="app">
  <div class="stripe" id="stripe"></div>
  <div class="hdr">
    <div>
      <div class="hdr-title" id="hdr-name">NexusHQ</div>
      <div class="hdr-sub" id="hdr-date"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="text-align:right">
        <div class="hdr-score" id="score-el">0</div>
        <div class="hdr-score-lbl">TODAY SCORE</div>
      </div>
      <button onclick="F.showSettings=true;render()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--txt3);padding:4px">⚙️</button>
    </div>
  </div>
  <div id="content"></div>
  <div class="nav" id="nav"></div>
</div>
<script>
// ─── Constants ────────────────────────────────────────────────────────────
const STRIPES=['#0060A9','#D02B27','#028A48','#FFC72C','#D35B2C','#BF0000','#009CDE','#00B140','#919D9D'];
const ACCENTS=['#4a9eff','#7B2FBE','#028A48','#c43030','#D35B2C','#c8a800','#ff69b4','#00cc88'];
const VIBE_TAGS=['Productive','Rest Day','Focused','Stressed','Social','Creative','Low Energy','Motivated','Sick','Grateful','Anxious','Clear-headed','Chill','Grinding'];
const PRESET_HABITS=[
  {id:'h-wake',name:'Wake up early',    icon:'⏰',key:true},
  {id:'h-move',name:'Move your body',   icon:'💪',key:true},
  {id:'h-read',name:'Read daily',       icon:'📖',key:false},
  {id:'h-h2o', name:'Stay hydrated',    icon:'💧',key:true},
  {id:'h-jour',name:'Journal daily',    icon:'📝',key:true},
  {id:'h-med', name:'Meditate',         icon:'🧘',key:false},
  {id:'h-eat', name:'Eat healthy',      icon:'🥗',key:false},
  {id:'h-slp', name:'Get enough sleep', icon:'😴',key:false},
  {id:'h-goal',name:'Work on your goal',icon:'🎯',key:true},
  {id:'h-grat',name:'Practice gratitude',icon:'🙏',key:false},
  {id:'h-plan',name:'Daily planning',   icon:'📋',key:false},
  {id:'h-conn',name:'Connect w/ someone',icon:'🤝',key:false},
];
const PROMPTS=[
  "What's one thing you're building today that will matter in 6 months?",
  "If today were your last productive day this week, what would you focus on?",
  "What's been blocking you and how will you push through it today?",
  "Who are you becoming? Describe that person.",
  "What's one small win you can guarantee yourself before the day ends?",
  "What would the most disciplined version of you do in the next 3 hours?",
  "What's one thing you've been putting off that you'll handle today?",
  "If someone filmed your day today, would you be proud of what they'd see?",
  "What does forward progress look like specifically today?",
  "What's one thing you can do today that future-you will thank you for?",
  "Where did yesterday's energy go? Where is today's going?",
  "What closes the gap between where you are and where you want to be?",
  "Name one thing that's working. Name one thing to fix. Go.",
  "What would winning today look like — specifically?",
  "You woke up. Nobody knows how hard this season is. What do you do with that?",
];
const MENTAL=['Anxiety','Focus','Stress','Motivation','Confidence','Clarity','Gratitude','Energy'];
const MCOL={Anxiety:'#c43030',Focus:'#4a9eff',Stress:'#D35B2C',Motivation:'#028A48',Confidence:'#c8a800',Clarity:'#7B2FBE',Gratitude:'#ff69b4',Energy:'#00cc88'};
const HUSTLE_PROMPTS=[
  {name:'Urban Concept Sketch',vibe:'Streetwear annotations / Afrodinero style',
   dalle:'Character concept art reference sheet, aged parchment paper background, urban streetwear aesthetic, black ink linework, detailed cross-hatching, pencil shading, callout arrows with style annotations, graffiti lettering accents, indie comic panel layout, highly detailed',
   mj:'character concept sketch sheet, aged parchment, urban streetwear, black ink linework, cross-hatching, annotation callout arrows, graffiti text accents, indie comic layout --ar 3:4 --style raw --v 6',
   col:'var(--orange)'},
  {name:'B-More Pastel Scribble',vibe:'Vibrant, gritty, textured street portrait',
   dalle:'Expressive portrait on thick brown cardboard paper, vibrant oil pastel and colored pencil scribbled marks, high-contrast street art style, gritty underground graphic novel energy, visible paper grain texture, raw emotive quality',
   mj:'expressive portrait, thick oil pastel on brown cardboard, vibrant scribbled lines, high contrast street art, underground graphic novel, visible paper grain --ar 3:4 --style raw --v 6',
   col:'var(--purple)'},
  {name:'Gallery Surrealism',vibe:'High-end mid-century editorial portrait',
   dalle:'Mid-century surrealist oil painting portrait, heavy impasto brushstroke canvas texture, warm cinematic lighting, stylized elongated proportions, high-fashion editorial aesthetic, fine art gallery quality, rich saturated color depth',
   mj:'mid-century surrealist oil painting portrait, impasto canvas texture, warm cinematic lighting, elongated proportions, editorial fashion, gallery quality, rich colors --ar 3:4 --v 6',
   col:'var(--accent)'},
];
const HUSTLE_CHECKS=[
  {id:'printer',label:'Canon Selphy charged & loaded'},
  {id:'battery',label:'Battery pack fully charged'},
  {id:'paper',label:'Paper pack loaded (108 sheets)'},
  {id:'hotspot',label:'5G hotspot tested & active'},
  {id:'table',label:'Folding table + signage packed'},
  {id:'sleeves',label:'Cellophane sleeves stocked'},
  {id:'cashapp',label:'CashApp / Venmo ready to scan'},
  {id:'prompts',label:'Prompts copied to notes app'},
];
const HUSTLE_LOCS=['Adams Morgan (18th St)','U Street Corridor','Gallery Place / Chinatown','Custom'];
const SPLBL={lead:'Lead',out:'Reached Out',meeting:'In Talks',closed:'Closed ✓',declined:'Declined'};
const PRLBL={unsent:'Not Sent',sent:'Sent',responded:'Responded',published:'Published ✓',passed:'Passed'};
const STCOL={lead:'#555',out:'#4a9eff',meeting:'#c8a800',closed:'#028A48',declined:'#c43030',unsent:'#555',sent:'#4a9eff',responded:'#c8a800',published:'#028A48',passed:'#c43030'};

// ─── State ────────────────────────────────────────────────────────────────
let S={};
let tab='today';
let F={
  mood:5,energy:5,ms:{},trigger:'',vibeTags:[],
  jans:'',ints:['','',''],win:'',emood:5,refl:'',
  sleep:'',water:0,mealinput:'',meals:[],pain:0,showpain:false,
  incamt:'',incsrc:'',expamt:'',expcat:'Food',expnote:'',
  opensp:null,openpr:null,openev:null,
  journalDate:'',showFocusMgr:false,showAddFocus:false,
  newFocTitle:'',newFocNote:'',newFocAction:'',newFocCat:'',
  showAddHabit:false,newHabName:'',newHabIcon:'📌',newHabKey:false,
  showAddSponsor:false,newSpName:'',newSpType:'',
  showAddPress:false,newPrName:'',newPrContact:'',
  showAddEvent:false,newEvTitle:'',newEvType:'health',newEvDate:'',
  showAddMil:false,newMilText:'',newMilVal:'',
  showSettings:false,setName:'',setGoal:'',setAccent:'',setTheme:'',
  ob:{step:0,name:'',goal:'1000',habits:['h-wake','h-move','h-jour','h-h2o','h-goal'],customHabs:[],newHabIcon:'📌',newHabName:'',newHabKey:false},
  shiftChecklist:{},shiftLocation:'Adams Morgan (18th St)',shiftPrice:15,shiftSheets:108,
};

// ─── Storage ──────────────────────────────────────────────────────────────
const STORE_KEY='nexushq1';
function load(){
  let raw=localStorage.getItem(STORE_KEY);
  if(!raw){
    const old=localStorage.getItem('taehq2');
    if(old){raw=old;localStorage.setItem(STORE_KEY,old);}
  }
  try{if(raw)S=JSON.parse(raw);}catch(ex){}
  if(!S.profile)S.profile={setup:false,name:'',goal:1000,accent:'#4a9eff',theme:'auto'};
  if(!S.profile.theme)S.profile.theme='auto';
  if(!S.ci)S.ci={};
  if(!S.moodlog)S.moodlog=[];
  if(!S.hlog)S.hlog={};
  if(!S.hablog)S.hablog={};
  if(!S.inclog)S.inclog=[];
  if(!S.explog)S.explog=[];
  if(!S.rev)S.rev=[];
  if(!S.wins)S.wins=[];
  if(!S.sponsors)S.sponsors=[];
  if(!S.press)S.press=[];
  if(!S.mil)S.mil=[];
  if(!S.events)S.events=[];
  if(!S.habits)S.habits=[];
  if(!S.focus)S.focus=[];
  if(!S.focusDone)S.focusDone={};
  if(!S.shifts)S.shifts=[];
  if(S.activeShift===undefined)S.activeShift=null;
  S.moodlog=S.moodlog.map(m=>m.id?m:{...m,id:Date.now()+Math.random()});
  // restore today body state
  const tl=S.hlog[tod()]||{};
  F.water=tl.water||0;
  F.sleep=tl.sleep!=null?String(tl.sleep):'';
  F.meals=[];
  F.journalDate=tod();
  // sync accent + theme CSS vars
  applyAccent(S.profile.accent||'#4a9eff');
  applyTheme(S.profile.theme||'auto');
}
function persist(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(S));}catch(ex){}
}
function applyAccent(col){
  document.documentElement.style.setProperty('--accent',col);
}
function applyTheme(pref){
  S.profile.theme=pref||'auto';
  const dark=pref==='dark'||(pref!=='light'&&window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='nexushq-export-'+tod()+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.profile){Object.assign(S,data);persist();render();alert('Data imported successfully!');}
      else alert('Invalid export file.');
    }catch(ex){alert('Could not read file.');}
  };
  reader.readAsText(file);
}

// ─── Helpers ──────────────────────────────────────────────────────────────
const tod=()=>new Date().toISOString().slice(0,10);
const f$=n=>n>=1000?'$'+(n/1000).toFixed(1)+'k':'$'+Math.round(n);
const ci=()=>S.ci[tod()]||{};
const hl=()=>S.hablog[tod()]||{};
const habits=()=>S.habits||[];
const keys=()=>habits().filter(h=>h.key);
const goal=()=>S.profile.goal||1000;
const monthInc=()=>S.inclog.filter(r=>r.date&&r.date.slice(0,7)===tod().slice(0,7)).reduce((s,r)=>s+parseFloat(r.amount||0),0);
function score(){
  const c=ci(),h=hl(),k=keys();
  const hd=k.filter(x=>h[x.id]).length;
  return Math.round(Math.min(100,(c.md?20:0)+(c.jd?15:0)+(hd/Math.max(1,k.length)*35)+(c.ed?20:0)+(c.win?10:0)));
}
function streak(id){
  let s=0;const d=new Date();
  for(let i=0;i<200;i++){
    const k=d.toISOString().slice(0,10);
    if(S.hablog[k]&&S.hablog[k][id])s++;else break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
function e(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function pct(v,mx){return Math.min(100,mx>0?(v/mx)*100:0).toFixed(0)}
function fmtDate(d){
  if(!d)return'';
  try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
  catch(ex){return d;}
}
function isEmail(s){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s||'');}
function isURL(s){return/^https?:\/\//i.test(s||'')||/^www\./i.test(s||'');}
function normalizeURL(s){return/^https?:\/\//i.test(s)?s:'https://'+s;}
function calcAmt(s){
  const clean=String(s||'').replace(/[^0-9+\-*/.() ]/g,'').trim();
  if(!clean)return 0;
  try{const v=Function('return '+clean)();return isNaN(v)?parseFloat(s)||0:Math.round(v*100)/100;}
  catch(ex){return parseFloat(s)||0;}
}
function copyToClipboard(txt){
  navigator.clipboard?.writeText(txt).catch(()=>{});
  const el=document.getElementById('copy-toast');
  if(el){el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1500);}
}

// ─── Render ───────────────────────────────────────────────────────────────
function render(){
  const c=document.getElementById('content');if(!c)return;
  const navEl=document.getElementById('nav');
  const hn=document.getElementById('hdr-name');
  if(hn)hn.textContent=(S.profile.name?S.profile.name+"'s HQ":'NexusHQ');
  const sc=score();
  const sel=document.getElementById('score-el');
  if(sel){sel.textContent=sc;sel.style.color=sc>=80?'var(--green)':sc>=50?'var(--yellow)':'var(--red)';}
  const de=document.getElementById('hdr-date');
  if(de)de.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}).toUpperCase();
  if(!S.profile.setup){
    if(navEl)navEl.style.display='none';
    c.innerHTML=renderOnboarding();
    return;
  }
  if(navEl)navEl.style.display='flex';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const fns={today:rToday,mind:rMind,body:rBody,money:rMoney,build:rBuild,journal:rJournal,hustle:rHustle};
  c.innerHTML=(fns[tab]||rToday)()+
    (F.showSettings?renderSettings():'')+
    '<div id="copy-toast" style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:8px 16px;border-radius:8px;font-size:11px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:500">Copied!</div>';
}

// ─── Onboarding ───────────────────────────────────────────────────────────
function renderOnboarding(){
  const ob=F.ob;

  const dots=STRIPES.map((c,i)=>`<div style="width:10px;height:10px;border-radius:50%;background:${c};animation:dotFloat ${2.4+i*.15}s ease-in-out infinite;animation-delay:${i*.2}s;flex-shrink:0"></div>`).join('');

  const featurePills=['⚡ Habits','🧠 Mind','💪 Body','💰 Money','🎯 Goals','📓 Journal']
    .map(f=>`<div style="border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 13px;font-size:10px;color:rgba(255,255,255,.65);letter-spacing:.5px;white-space:nowrap">${f}</div>`).join('');

  const hero=`

function obNext(){if(!F.ob.name.trim())return;F.ob.step=1;render();}
function obTogHab(id){
  const i=F.ob.habits.indexOf(id);
  if(i>=0)F.ob.habits.splice(i,1);else F.ob.habits.push(id);
  render();
}
function obAddCustomHab(){
  if(!F.ob.newHabName.trim())return;
  if(!F.ob.customHabs)F.ob.customHabs=[];
  F.ob.customHabs.push({id:'hc'+Date.now(),name:F.ob.newHabName.trim(),icon:F.ob.newHabIcon||'📌',key:F.ob.newHabKey});
  F.ob.newHabName='';F.ob.newHabIcon='📌';F.ob.newHabKey=false;render();
}
function obFinish(){
  S.profile.setup=true;
  S.profile.name=F.ob.name.trim();
  S.profile.goal=parseFloat(F.ob.goal)||1000;
  S.profile.accent='#4a9eff';
  S.profile.theme='auto';
  S.habits=[
    ...F.ob.habits.map(id=>PRESET_HABITS.find(h=>h.id===id)).filter(Boolean).map(h=>({...h})),
    ...(F.ob.customHabs||[])
  ];
  persist();render();
}

<div onclick="togMil(${m.id})" style="flex:1;font-size:11px;color:${m.done?'var(--txt3)':'var(--txt2)'};text-decoration:${m.done?'line-through':'none'};line-height:1.5;cursor:pointer">${e(m.text)}</div>
<div style="font-size:9px;color:${m.done?'var(--yellow)':'var(--txt3)'};font-weight:700;border:1px solid ${m.done?'rgba(200,168,0,.3)':'var(--border)'};border-radius:6px;padding:3px 8px;white-space:nowrap">${e(m.val)}</div>
<button class="del-btn" onclick="delMil(${m.id})">×</button>
</div>`).join('');

  const addMilForm=F.showAddMil
    ?`<div class="card" style="padding:12px;margin-bottom:8px">
<div style="font-size:10px;font-weight:700;color:var(--yellow);margin-bottom:8px">NEW MILESTONE</div>
<input class="inp row-gap" placeholder="The milestone..." value="${e(F.newMilText)}" oninput="F.newMilText=this.value">
<input class="inp" placeholder="Target / value..." value="${e(F.newMilVal)}" oninput="F.newMilVal=this.value" style="margin-bottom:8px">
<div style="display:flex;gap:6px">
<button class="btn" style="background:var(--yellow);color:#000;flex:1" onclick="addMil()">ADD</button>
<button class="btn" style="background:rgba(0,0,0,.06);color:var(--txt2)" onclick="F.showAddMil=false;render()">CANCEL</button>
</div></div>`
    :`<div class="add-row" onclick="F.showAddMil=true;render()">+ ADD MILESTONE</div>`;

  const revRows=[...S.rev].reverse().slice(0,5).map(r=>`<div class="tx-row">
<div style="flex:1"><div style="font-size:11px;font-weight:700">${e(r.source)}</div><div style="font-size:9px;color:var(--txt3)">${r.date}</div></div>
<div style="font-size:14px;font-weight:700;color:var(--green)">+$${parseFloat(r.amount).toFixed(0)}</div>
<button class="del-btn" onclick="delRev(${r.id})">×</button>
</div>`).join('');

  const noSp=S.sponsors.length===0&&!F.showAddSponsor;
  const noPr=S.press.length===0&&!F.showAddPress;
  const noEv=S.events.length===0&&!F.showAddEvent;
  const noMil=S.mil.length===0&&!F.showAddMil;

  return`
<div class="stat-grid">
<div class="stat-card"><div style="font-size:22px;font-weight:700;color:var(--green);line-height:1">${f$(tr)}</div><div style="font-size:7px;color:var(--txt3);letter-spacing:2px;margin-top:3px">REVENUE LOGGED</div></div>
<div class="stat-card"><div style="font-size:22px;font-weight:700;color:var(--blue);line-height:1">${S.sponsors.filter(s=>s.status==='closed').length}</div><div style="font-size:7px;color:var(--txt3);letter-spacing:2px;margin-top:3px">PIPELINE CLOSED</div></div>
</div>
<div class="card">
<span class="slbl" style="color:var(--green)">💰 LOG REVENUE</span>
<div style="display:flex;gap:8px;margin-bottom:${revRows?'8px':'0'}">
<input class="inp" type="number" placeholder="$" id="ra" style="width:70px">
<input class="inp" placeholder="Source..." id="rs" style="flex:1">
<button class="btn" style="background:var(--green);color:#fff" onclick="logRev()">LOG</button>
</div>
${revRows}
</div>
<div style="font-size:8px;letter-spacing:3px;color:var(--txt3);margin-bottom:10px;font-weight:700">🎯 OUTREACH PIPELINE</div>
${noSp?'':''}${spRows}${addSpForm}
${noSp?`<div style="font-size:11px;color:var(--txt3);text-align:center;padding:8px 0 4px">No contacts in your pipeline yet.</div>`:''}
<div style="font-size:8px;letter-spacing:3px;color:var(--txt3);margin-bottom:10px;font-weight:700;margin-top:8px">📰 MEDIA CONTACTS</div>
${prRows}${addPrForm}
${noPr?`<div style="font-size:11px;color:var(--txt3);text-align:center;padding:8px 0 4px">No media contacts yet.</div>`:''}
<div style="font-size:8px;letter-spacing:3px;color:var(--txt3);margin-bottom:10px;font-weight:700;margin-top:8px">📅 EVENTS & DEADLINES</div>
${evRows}${addEvForm}
${noEv?`<div style="font-size:11px;color:var(--txt3);text-align:center;padding:8px 0 4px">No upcoming events.</div>`:''}
<div style="font-size:8px;letter-spacing:3px;color:var(--txt3);margin-bottom:10px;font-weight:700;margin-top:8px">🏆 MILESTONES</div>
${S.mil.length?`<div class="card" style="margin-bottom:10px"><div class="pbar" style="height:6px"><div class="pbar-fill" style="width:${pct(dm,S.mil.length)}%;height:100%;background:var(--yellow)"></div></div><div style="font-size:9px;color:var(--txt3);margin-top:4px">${dm}/${S.mil.length} complete</div></div>`:''}
${milRows}${addMilForm}
${noMil?`<div style="font-size:11px;color:var(--txt3);text-align:center;padding:8px 0 4px">No milestones set yet.</div>`:''}`;
}

// ─── JOURNAL ──────────────────────────────────────────────────────────────
function rJournal(){
  const d=F.journalDate||tod();
  const c=S.ci[d]||{};
  const h=S.hablog[d]||{};
  const tl=S.hlog[d]||{};
  const moods=S.moodlog.filter(m=>m.date===d);
  const habs=habits();
  const habsDone=habs.filter(hb=>h[hb.id]);

  const dateset=new Set([tod(),...Object.keys(S.ci),...Object.keys(S.hablog),...Object.keys(S.hlog),...S.moodlog.map(m=>m.date)]);
  const allDates=[...dateset].filter(Boolean).sort().reverse().slice(0,60);
  const dateOpts=allDates.map(dt=>`<option value="${dt}"${dt===d?' selected':''}>${fmtDate(dt)}</option>`).join('');

  const sc=()=>{
    const k=habs.filter(x=>x.key);
    const hd=k.filter(x=>h[x.id]).length;
    return Math.round(Math.min(100,(c.md?20:0)+(c.jd?15:0)+(hd/Math.max(1,k.length)*35)+(c.ed?20:0)+(c.win?10:0)));
  };
  const dayScore=sc();
  const scol=dayScore>=80?'var(--green)':dayScore>=50?'var(--yellow)':'var(--red)';

  const mornS=c.md?`<div style="padding:10px 0;border-bottom:1px solid var(--border)">
<div style="font-size:8px;letter-spacing:2px;color:var(--accent);font-weight:700;margin-bottom:5px">☀️ MORNING · MOOD ${c.mood}/10</div>
${(c.ints||[]).filter(Boolean).map(i=>`<div style="font-size:11px;color:var(--txt2);line-height:1.8">→ ${e(i)}</div>`).join('')}
</div>`:'';

  const jS=c.jd?`<div style="padding:10px 0;border-bottom:1px solid var(--border)">
<div style="font-size:8px;letter-spacing:2px;color:var(--purple);font-weight:700;margin-bottom:5px">📝 JOURNAL</div>
<div style="font-size:11px;color:var(--txt2);line-height:1.7;font-style:italic">"${e(c.jans)}"</div>
</div>`:'';

  const habS=`<div style="padding:10px 0;border-bottom:1px solid var(--border)">
<div style="font-size:8px;letter-spacing:2px;color:var(--green);font-weight:700;margin-bottom:5px">🔥 HABITS · ${habsDone.length}/${habs.length}</div>
${habsDone.map(hb=>`<div style="font-size:11px;color:var(--green);padding:2px 0">✓ ${hb.icon} ${hb.name}</div>`).join('')}
${!habsDone.length?'<div style="font-size:11px;color:var(--txt3)">None completed</div>':''}
</div>`;

  const bodyParts=[];
  if(tl.sleep!=null)bodyParts.push(`💤 <b>${tl.sleep}h</b> sleep`);
  if(tl.water!=null)bodyParts.push(`💧 <b>${tl.water}</b> glasses`);
  if(tl.pain!=null)bodyParts.push(`🦶 Pain <b>${tl.pain}/10</b>`);
  if(tl.meals?.length)bodyParts.push(`🍽️ ${tl.meals.map(m=>e(m)).join(', ')}`);
  const bodyS=bodyParts.length?`<div style="padding:10px 0;border-bottom:1px solid var(--border)">
<div style="font-size:8px;letter-spacing:2px;color:var(--orange);font-weight:700;margin-bottom:5px">💪 BODY</div>
${bodyParts.map(p=>`<div style="font-size:11px;color:var(--txt2);padding:2px 0">${p}</div>`).join('')}
</div>`:'';

  const moodS=moods.length?`<div style="padding:10px 0;border-bottom:1px solid var(--border)">
<div style="font-size:8px;letter-spacing:2px;color:var(--purple);font-weight:700;margin-bottom:5px">😊 MOOD</div>
${moods.map(m=>{
  const col=m.mood>=7?'var(--green)':m.mood>=5?'var(--yellow)':'var(--red)';
  const vibes=(m.vibeTags||[]).map(t=>`<span class="pill" style="background:rgba(74,158,255,.1);color:var(--accent);border:1px solid rgba(74,158,255,.25);margin:2px">${t}</span>`).join('');
  return`<div style="margin-bottom:4px"><span style="font-size:12px;font-weight:700;color:${col}">${m.mood}/10</span>${m.energy!=null?` <span style="font-size:10px;color:var(--yellow)">⚡${m.energy}</span>`:''}${m.trigger?` <span style="font-size:10px;color:var(--txt2);font-style:italic">— ${e(m.trigger)}</span>`:''}</div>${vibes?`<div>${vibes}</div>`:''}`;
}).join('')}
</div>`:'';

  const eveS=c.ed?`<div style="padding:10px 0">
<div style="font-size:8px;letter-spacing:2px;color:var(--purple);font-weight:700;margin-bottom:5px">🌙 EVENING · MOOD ${c.emood}/10</div>
${c.win?`<div style="font-size:12px;color:var(--yellow);font-weight:700;margin-bottom:4px">🏆 ${e(c.win)}</div>`:''}
${c.refl?`<div style="font-size:11px;color:var(--txt2);line-height:1.7;font-style:italic">"${e(c.refl)}"</div>`:''}
</div>`:'';

  const hasData=c.md||c.jd||habsDone.length||bodyParts.length||moods.length||c.ed;
  const dayInc=S.inclog.filter(r=>r.date===d);
  const dayExp=S.explog.filter(r=>r.date===d);
  const moneyS=(dayInc.length||dayExp.length)?`<div class="card">
<span class="slbl" style="color:var(--green)">💰 MONEY</span>
${dayInc.map(r=>`<div class="tx-row"><div style="flex:1;font-size:11px;font-weight:700">${e(r.source)}</div><div style="font-size:13px;font-weight:700;color:var(--green)">+$${parseFloat(r.amount).toFixed(0)}</div></div>`).join('')}
${dayExp.map(r=>`<div class="tx-row"><div style="flex:1"><div style="font-size:11px;font-weight:700">${e(r.category)}</div>${r.note?`<div style="font-size:9px;color:var(--txt3)">${e(r.note)}</div>`:''}</div><div style="font-size:13px;font-weight:700;color:var(--red)">-$${parseFloat(r.amount).toFixed(0)}</div></div>`).join('')}
</div>`:'';

  const winsS=(S.wins||[]).length?`<div class="card">
<span class="slbl" style="color:var(--yellow)">🏆 WINS LOG</span>
${(S.wins||[]).slice(0,20).map((w,i)=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start">
<div><div style="font-size:11px;color:var(--yellow);font-weight:700">${e(w.text)}</div><div style="font-size:9px;color:var(--txt3)">${w.date}</div></div>
<button class="del-btn" onclick="delWin(${i})">×</button>
</div>`).join('')}
</div>`:'';

  return`
<div class="card">
<span class="slbl">📓 DAILY JOURNAL</span>
<select class="inp" onchange="F.journalDate=this.value;render()" style="margin-bottom:6px">${dateOpts}</select>
<div style="display:flex;justify-content:space-between;align-items:center">
<div style="font-size:9px;color:var(--txt3)">${fmtDate(d)}</div>
${hasData?`<div style="font-size:12px;font-weight:700;color:${scol}">${dayScore}/100</div>`:''}
</div>
</div>
${hasData?`<div class="card">${mornS}${jS}${habS}${bodyS}${moodS}${eveS}</div>`
:`<div class="card"><div style="font-size:11px;color:var(--txt3);text-align:center;padding:20px 0">No data logged for this day.</div></div>`}
${moneyS}${winsS}`;
}

// ─── HUSTLE ───────────────────────────────────────────────────────────────
function rHustle(){
  const active=S.activeShift;

  if(active){
    const elapsed=Math.max(0,Math.floor((Date.now()-active.startMs)/60000));
    const hrs=Math.floor(elapsed/60);const mins=elapsed%60;
    const gross=active.orders*(active.price||15);
    const net=Math.round((active.orders*((active.price||15)-0.38))*100)/100;
    const sheetsLeft=(active.sheetsStart||108)-active.orders;
    const pace=active.orders>0?(elapsed/active.orders).toFixed(0):'—';
    const projNet=elapsed>0?Math.round((net/elapsed)*300):0;
    return`
<div style="background:linear-gradient(135deg,#015c30,var(--green));border-radius:14px;padding:20px;margin-bottom:14px;color:#fff;position:relative">
<div style="font-size:8px;letter-spacing:3px;opacity:.7;margin-bottom:4px">● SHIFT ACTIVE</div>
<div style="font-size:20px;font-weight:700;margin-bottom:3px">${e(active.location)}</div>
<div style="font-size:10px;opacity:.75">Started ${new Date(active.startMs).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})} · ${hrs>0?hrs+'h ':''} ${mins}m running</div>
</div>

<div class="stat-grid" style="margin-bottom:12px">
<div class="stat-card"><div style="font-size:38px;font-weight:700;color:var(--green);line-height:1;text-align:center">${active.orders}</div><div style="font-size:7px;color:var(--txt3);letter-spacing:2px;margin-top:4px;text-align:center">PRINTS SOLD</div></div>
<div class="stat-card"><div style="font-size:30px;font-weight:700;color:var(--green);line-height:1;text-align:center">${f$(net)}</div><div style="font-size:7px;color:var(--txt3);letter-spacing:2px;margin-top:4px;text-align:center">NET PROFIT</div></div>
</div>
<div class="stat-grid" style="margin-bottom:14px">
<div class="stat-card"><div style="font-size:24px;font-weight:700;color:var(--yellow);line-height:1;text-align:center">${sheetsLeft}</div><div style="font-size:7px;color:var(--txt3);letter-spacing:2px;margin-top:4px;text-align:center">SHEETS LEFT</div></div>
<div class="stat-card"><div style="font-size:24px;font-weight:700;color:var(--accent);line-height:1;text-align:center">${pace}</div><div style="font-size:7px;color:var(--txt3);letter-spacing:2px;margin-top:4px;text-align:center">MIN / SALE</div></div>
</div>

<button class="btn btn-full" style="background:var(--green);color:#fff;font-size:17px;padding:20px;margin-bottom:10px;letter-spacing:1px" onclick="logSale()">+ SOLD ONE &nbsp;·&nbsp; ${f$(active.price||15)}</button>
${active.orders>0?`<button class="btn btn-full" style="background:var(--dim);color:var(--txt3);font-size:10px;margin-bottom:10px" onclick="undoSale()">↩ UNDO LAST SALE</button>`:''}
<button class="btn btn-full" style="background:rgba(196,48,48,.1);color:var(--red);border:1px solid rgba(196,48,48,.2);font-size:11px" onclick="endShift()">END SHIFT &amp; SAVE EARNINGS</button>
${projNet>0?`<div style="font-size:9px;color:var(--txt3);text-align:center;margin-top:8px">At this pace → ${f$(projNet)} projected / 5-hr shift</div>`:''}`;
  }

  // Pre-shift view
  const checkDone=HUSTLE_CHECKS.filter(c=>F.shiftChecklist[c.id]).length;
  const checkRows=HUSTLE_CHECKS.map(c=>{
    const done=!!F.shiftChecklist[c.id];
    return`<div class="chk-row" onclick="F.shiftChecklist['${c.id}']=!F.shiftChecklist['${c.id}'];render()">
<div class="chk-box${done?' done':''}">✓</div>
<span class="chk-lbl${done?' done':''}">${c.label}</span>
</div>`;
  }).join('');

  const locOpts=HUSTLE_LOCS.map(l=>`<option${F.shiftLocation===l?' selected':''}>${l}</option>`).join('');

  const promptCards=HUSTLE_PROMPTS.map((p,i)=>`
<div class="card" style="padding:14px;margin-bottom:8px">
<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
<div style="width:10px;height:10px;border-radius:50%;background:${p.col};flex-shrink:0"></div>
<div style="font-size:12px;font-weight:700">${p.name}</div>
</div>
<div style="font-size:9px;color:var(--txt3);margin-bottom:10px;padding-left:18px">${p.vibe}</div>
<div style="font-size:8px;letter-spacing:1px;color:var(--txt3);margin-bottom:4px">CHATGPT / DALL-E</div>
<div style="background:var(--dim);border-radius:6px;padding:9px;font-size:10px;color:var(--txt2);line-height:1.65;margin-bottom:6px">${e(p.dalle)}</div>
<button class="btn btn-full" style="background:var(--dim);color:var(--accent);font-size:9px;letter-spacing:1px;margin-bottom:10px" onclick="copyToClipboard(HUSTLE_PROMPTS[${i}].dalle)">COPY DALL-E PROMPT</button>
<div style="font-size:8px;letter-spacing:1px;color:var(--txt3);margin-bottom:4px">MIDJOURNEY</div>
<div style="background:var(--dim);border-radius:6px;padding:9px;font-size:10px;color:var(--txt2);line-height:1.65;margin-bottom:6px">${e(p.mj)}</div>
<button class="btn btn-full" style="background:var(--dim);color:var(--purple);font-size:9px;letter-spacing:1px" onclick="copyToClipboard(HUSTLE_PROMPTS[${i}].mj)">COPY MIDJOURNEY PROMPT</button>
</div>`).join('');

  const shifts=[...S.shifts].reverse();
  const totalNet=S.shifts.reduce((s,sh)=>s+(sh.net||0),0);
  const shiftHistory=shifts.slice(0,8).map(sh=>{
    const dur=sh.endMs&&sh.startMs?Math.round((sh.endMs-sh.startMs)/60000):null;
    const durStr=dur?(Math.floor(dur/60)?Math.floor(dur/60)+'h ':'')+dur%60+'m':'';
    return`<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
<div><div style="font-size:11px;font-weight:700">${e(sh.location)}</div>
<div style="font-size:9px;color:var(--txt3)">${sh.date}${durStr?' · '+durStr:''}</div></div>
<div style="text-align:right">
<div style="font-size:13px;font-weight:700;color:var(--green)">${f$(sh.net||0)}</div>
<div style="font-size:9px;color:var(--txt3)">${sh.orders} prints</div>
</div></div>`;
  }).join('');

  return`
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
<span class="slbl" style="color:var(--green);margin-bottom:0">✅ PRE-SHIFT CHECKLIST</span>
<span style="font-size:9px;color:${checkDone===HUSTLE_CHECKS.length?'var(--green)':'var(--txt3)'};">${checkDone}/${HUSTLE_CHECKS.length}</span>
</div>
<div class="pbar" style="height:5px;margin-bottom:12px"><div class="pbar-fill" style="width:${pct(checkDone,HUSTLE_CHECKS.length)}%;height:100%;background:var(--green)"></div></div>
${checkRows}
</div>

<div class="card">
<span class="slbl" style="color:var(--accent)">⚡ START A SHIFT</span>
<div style="font-size:9px;color:var(--txt3);letter-spacing:2px;margin-bottom:5px">LOCATION</div>
<select class="inp" onchange="F.shiftLocation=this.value" style="margin-bottom:10px">${locOpts}</select>
<div style="display:flex;gap:8px;margin-bottom:12px">
<div style="flex:1">
<div style="font-size:9px;color:var(--txt3);letter-spacing:2px;margin-bottom:5px">PRICE / PRINT</div>
<div style="position:relative">
<span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;font-weight:700">$</span>
<input class="inp" type="number" value="${e(F.shiftPrice)}" oninput="F.shiftPrice=+this.value" style="padding-left:22px">
</div>
</div>
<div style="flex:1">
<div style="font-size:9px;color:var(--txt3);letter-spacing:2px;margin-bottom:5px">SHEETS LOADED</div>
<input class="inp" type="number" value="${e(F.shiftSheets)}" oninput="F.shiftSheets=+this.value">
</div>
</div>
<div style="background:var(--dim);border-radius:8px;padding:10px;font-size:10px;color:var(--txt3);margin-bottom:12px;line-height:1.7">
💰 <b style="color:var(--green)">$${(F.shiftPrice-0.38).toFixed(2)}</b> net per print &nbsp;·&nbsp;
4 sales/hr = <b style="color:var(--green)">${f$((F.shiftPrice-0.38)*20)}</b> per 5h shift
</div>
<button class="btn btn-full" style="background:var(--green);color:#fff;font-size:13px;padding:15px" onclick="startShift()">START SHIFT →</button>
</div>

<div style="font-size:8px;letter-spacing:3px;color:var(--txt3);margin-bottom:10px;font-weight:700">🎨 PROMPT LIBRARY</div>
${promptCards}

${S.shifts.length?`<div class="card">
<span class="slbl" style="color:var(--yellow)">📊 SHIFT HISTORY</span>
${shiftHistory}
<div style="font-size:9px;color:var(--txt3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between">
<span>${S.shifts.length} shifts</span>
<span style="color:var(--green);font-weight:700">Total net: ${f$(totalNet)}</span>
</div></div>`:''}`;
}

// ─── Handlers ─────────────────────────────────────────────────────────────
function saveMorn(){if(!S.ci[tod()])S.ci[tod()]={};Object.assign(S.ci[tod()],{md:true,mood:F.mood,ints:[...F.ints]});persist();render();}
function editMorn(){const c=S.ci[tod()]||{};F.mood=c.mood||5;F.ints=[...(c.ints||['','',''])];if(S.ci[tod()])S.ci[tod()].md=false;persist();render();}
function saveJourn(){if(!S.ci[tod()])S.ci[tod()]={};Object.assign(S.ci[tod()],{jd:!!F.jans.trim(),jans:F.jans});persist();render();}
function editJourn(){const c=S.ci[tod()]||{};F.jans=c.jans||'';if(S.ci[tod()])S.ci[tod()].jd=false;persist();render();}
function saveEve(){
  if(!S.ci[tod()])S.ci[tod()]={};
  Object.assign(S.ci[tod()],{ed:true,emood:F.emood,refl:F.refl,win:F.win});
  if(F.win.trim())S.wins=[{text:F.win,date:tod(),id:Date.now()},...(S.wins||[])];
  persist();render();
}
function editEve(){const c=S.ci[tod()]||{};F.win=c.win||'';F.refl=c.refl||'';F.emood=c.emood||5;if(S.ci[tod()])S.ci[tod()].ed=false;persist();render();}
function togHab(id){if(!S.hablog[tod()])S.hablog[tod()]={};S.hablog[tod()][id]=!S.hablog[tod()][id];persist();render();}
function addHabit(){
  if(!F.newHabName.trim())return;
  S.habits.push({id:'h'+Date.now(),name:F.newHabName.trim(),icon:F.newHabIcon||'📌',key:F.newHabKey});
  F.newHabName='';F.newHabIcon='📌';F.newHabKey=false;F.showAddHabit=false;persist();render();
}
function removeHabit(id){if(!confirm('Remove this habit?'))return;S.habits=S.habits.filter(h=>h.id!==id);persist();render();}
function togVibe(t){const i=F.vibeTags.indexOf(t);if(i>=0)F.vibeTags.splice(i,1);else F.vibeTags.push(t);render();}
function logMood(){S.moodlog.push({id:Date.now(),date:tod(),mood:F.mood,energy:F.energy,ms:{...F.ms},trigger:F.trigger,vibeTags:[...F.vibeTags]});F.trigger='';F.vibeTags=[];persist();render();}
function delMood(idx){S.moodlog.splice(idx,1);persist();render();}
function adjWater(d){F.water=Math.max(0,F.water+d);render();}
function addMeal(){if(!F.mealinput.trim())return;F.meals.push(F.mealinput.trim());F.mealinput='';render();}
function removeSavedMeal(i){if(!S.hlog[tod()]?.meals)return;S.hlog[tod()].meals.splice(i,1);persist();render();}
function syncBody(){
  if(!S.hlog[tod()])S.hlog[tod()]={};
  const d=S.hlog[tod()];
  if(F.sleep!=='')d.sleep=parseFloat(F.sleep)||0;
  d.water=F.water;
  if(F.meals.length){if(!d.meals)d.meals=[];d.meals.push(...F.meals);F.meals=[];}
  if(F.showpain){d.pain=F.pain;F.showpain=false;}
  persist();render();
}
function logInc(){const amt=calcAmt(F.incamt);if(!amt||!F.incsrc.trim())return;S.inclog.push({id:Date.now(),amount:amt,source:F.incsrc,date:tod()});F.incamt='';persist();render();}
function logExp(){const amt=calcAmt(F.expamt);if(!amt)return;S.explog.push({id:Date.now(),amount:amt,category:F.expcat,note:F.expnote,date:tod()});F.expamt='';F.expnote='';persist();render();}
function delInc(id){S.inclog=S.inclog.filter(r=>r.id!==id);persist();render();}
function delExp(id){S.explog=S.explog.filter(r=>r.id!==id);persist();render();}
function logRev(){const a=parseFloat(document.getElementById('ra')?.value);const s=document.getElementById('rs')?.value;if(!a||!s)return;S.rev.push({id:Date.now(),amount:a,source:s,date:tod()});persist();render();}
function delRev(id){S.rev=S.rev.filter(r=>r.id!==id);persist();render();}
function togFocus(id){if(!S.focusDone[tod()])S.focusDone[tod()]={};S.focusDone[tod()][id]=!S.focusDone[tod()][id];persist();render();}
function addFocus(){
  if(!F.newFocTitle.trim())return;
  S.focus.push({id:'f'+Date.now(),title:F.newFocTitle.trim(),note:F.newFocNote.trim(),action:F.newFocAction.trim(),cat:F.newFocCat.trim()});
  F.newFocTitle='';F.newFocNote='';F.newFocAction='';F.newFocCat='';F.showAddFocus=false;persist();render();
}
function delFocus(id){S.focus=S.focus.filter(f=>f.id!==id);persist();render();}
function setSpSt(id,st){S.sponsors=S.sponsors.map(s=>s.id===id?{...s,status:st}:s);persist();render();}
function spNote(id,v){S.sponsors=S.sponsors.map(s=>s.id===id?{...s,notes:v}:s);persist();}
function addSponsor(){if(!F.newSpName.trim())return;S.sponsors.push({id:Date.now(),name:F.newSpName.trim(),type:F.newSpType,status:'lead',notes:''});F.newSpName='';F.newSpType='';F.showAddSponsor=false;persist();render();}
function delSponsor(id){if(!confirm('Remove?'))return;S.sponsors=S.sponsors.filter(s=>s.id!==id);persist();render();}
function setPrSt(id,st){S.press=S.press.map(p=>p.id===id?{...p,status:st}:p);persist();render();}
function prNote(id,v){S.press=S.press.map(p=>p.id===id?{...p,notes:v}:p);persist();}
function addPress(){if(!F.newPrName.trim())return;S.press.push({id:Date.now(),name:F.newPrName.trim(),contact:F.newPrContact,status:'unsent',notes:''});F.newPrName='';F.newPrContact='';F.showAddPress=false;persist();render();}
function delPress(id){if(!confirm('Remove?'))return;S.press=S.press.filter(p=>p.id!==id);persist();render();}
function togMil(id){S.mil=S.mil.map(m=>m.id===id?{...m,done:!m.done}:m);persist();render();}
function addMil(){if(!F.newMilText.trim())return;S.mil.push({id:Date.now(),text:F.newMilText.trim(),val:F.newMilVal,done:false});F.newMilText='';F.newMilVal='';F.showAddMil=false;persist();render();}
function delMil(id){if(!confirm('Remove?'))return;S.mil=S.mil.filter(m=>m.id!==id);persist();render();}
function evDate(id,v){S.events=S.events.map(ev=>ev.id===id?{...ev,date:v}:ev);persist();}
function evNote(id,v){S.events=S.events.map(ev=>ev.id===id?{...ev,notes:v}:ev);persist();}
function addEvent(){if(!F.newEvTitle.trim())return;S.events.push({id:Date.now(),title:F.newEvTitle.trim(),type:F.newEvType,date:F.newEvDate,notes:''});F.newEvTitle='';F.newEvDate='';F.showAddEvent=false;persist();render();}
function delEvent(id){if(!confirm('Remove?'))return;S.events=S.events.filter(ev=>ev.id!==id);persist();render();}
function delWin(i){S.wins.splice(i,1);persist();render();}
function startShift(){
  S.activeShift={id:Date.now(),location:F.shiftLocation||'Adams Morgan (18th St)',startMs:Date.now(),date:tod(),orders:0,price:F.shiftPrice||15,sheetsStart:F.shiftSheets||108};
  F.shiftChecklist={};persist();tab='hustle';render();
}
function logSale(){
  if(!S.activeShift)return;
  S.activeShift.orders++;persist();render();
}
function undoSale(){
  if(!S.activeShift||S.activeShift.orders<=0)return;
  S.activeShift.orders--;persist();render();
}
function endShift(){
  if(!S.activeShift)return;
  const sh=S.activeShift;
  sh.endMs=Date.now();
  sh.net=Math.round((sh.orders*((sh.price||15)-0.38))*100)/100;
  sh.gross=sh.orders*(sh.price||15);
  if(!S.shifts)S.shifts=[];
  S.shifts.push({...sh});
  if(sh.orders>0)S.inclog.push({id:Date.now(),amount:sh.gross,source:'AI Art Hustle — '+sh.location,date:tod()});
  S.activeShift=null;persist();render();
}
function switchTab(t){tab=t;F.opensp=null;F.openpr=null;F.openev=null;render();}

// ─── Init ─────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{
  if((S.profile?.theme||'auto')==='auto')applyTheme('auto');
});
const strEl=document.getElementById('stripe');
STRIPES.forEach(c=>{const d=document.createElement('div');d.style.cssText=`flex:1;background:${c}`;strEl.appendChild(d);});
const navEl=document.getElementById('nav');
[{id:'today',icon:'⚡',lbl:'Today'},{id:'mind',icon:'🧠',lbl:'Mind'},{id:'body',icon:'💪',lbl:'Body'},{id:'money',icon:'💰',lbl:'Money'},{id:'build',icon:'🎯',lbl:'Build'},{id:'journal',icon:'📓',lbl:'Journal'},{id:'hustle',icon:'🎨',lbl:'Hustle'}].forEach(t=>{
  const b=document.createElement('button');
  b.className='nav-btn'+(t.id===tab?' active':'');
  b.dataset.tab=t.id;
  b.innerHTML=`<span class="nav-icon">${t.icon}</span><span class="nav-lbl">${t.lbl}</span>`;
  b.onclick=()=>switchTab(t.id);
  navEl.appendChild(b);
});
load();
render();
</script>
</body>
</html>
