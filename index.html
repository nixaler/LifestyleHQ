<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tae's HQ">
<title>Tae's HQ</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f7;--card:#ffffff;--card2:#f0f0f4;
  --border:rgba(0,0,0,.08);
  --txt:#111111;--txt2:rgba(0,0,0,.55);--txt3:rgba(0,0,0,.28);
  --purple:#7B2FBE;--green:#028A48;--yellow:#c8a800;
  --blue:#0060A9;--red:#c43030;--orange:#D35B2C;--accent:#4a9eff;
}
html{background:#f5f5f7}body{background:#f5f5f7;font-family:'JetBrains Mono','Courier New',monospace;color:#111111;min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:#f5f5f7}
.stripe{height:4px;display:flex;flex-shrink:0}
.hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#ffffff}
.hdr-title{font-size:16px;font-weight:700}
.hdr-sub{font-size:8px;color:var(--txt3);letter-spacing:3px;margin-top:2px}
.hdr-score{font-size:22px;font-weight:700;text-align:right}
.hdr-score-lbl{font-size:7px;color:var(--txt3);letter-spacing:1px}
#content{flex:1;padding:14px 16px;overflow-y:auto;padding-bottom:calc(72px + env(safe-area-inset-bottom,16px));background:#f5f5f7}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#ffffff;border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,8px);z-index:100}
.nav-btn{flex:1;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border-top:2px solid transparent;background:transparent;border-left:none;border-right:none;border-bottom:none;color:var(--txt3);font-family:inherit}
.nav-btn.active{border-top-color:var(--accent);color:var(--accent)}
.nav-icon{font-size:17px}
.nav-lbl{font-size:7.5px;letter-spacing:1px;font-weight:400}
.nav-btn.active .nav-lbl{font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.slbl{font-size:8px;letter-spacing:3px;color:var(--txt3);margin-bottom:10px;font-weight:700;display:block}
.pbar{background:rgba(0,0,0,.06);border-radius:6px;overflow:hidden}
.pbar-fill{border-radius:6px;transition:width .4s}
.btn{border:none;border-radius:8px;padding:10px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px}
.btn-full{width:100%}
.inp{background:rgba(0,0,0,.04);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--txt);font-size:12px;font-family:inherit;outline:none;width:100%}
.inp:focus{border-color:var(--accent)}
select.inp option{background:#fff;color:#111}
textarea.inp{resize:none;line-height:1.7}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:4px;background:rgba(0,0,0,.1);outline:none;display:block;margin:4px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer}
.chk-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.chk-box{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid rgba(0,0,0,.15);color:transparent}
.chk-box.done{background:var(--green);border-color:var(--green);color:#000}
.chk-lbl{font-size:12px;flex:1}
.chk-lbl.done{color:var(--txt3);text-decoration:line-through}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.pill{display:inline-block;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:700}
.exp-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.row-gap{margin-bottom:8px}
</style>
</head>
<body>
<div id="app">
  <div class="stripe" id="stripe"></div>
  <div class="hdr">
    <div>
      <div class="hdr-title">Tae's HQ</div>
      <div class="hdr-sub" id="hdr-date"></div>
    </div>
    <div style="text-align:right">
      <div class="hdr-score" id="score-el">0</div>
      <div class="hdr-score-lbl">TODAY SCORE</div>
    </div>
  </div>
  <div id="content"></div>
  <div class="nav" id="nav"></div>
</div>
<script>
// ─── Data ──────────────────────────────────────────────────────────────────
const STRIPES=['#0060A9','#D02B27','#028A48','#FFC72C','#D35B2C','#BF0000','#009CDE','#00B140','#919D9D'];
const HABITS=[
  {id:'wake', name:'Wake by 8AM',         icon:'⏰',key:true},
  {id:'journ',name:'Journal daily',        icon:'📝',key:true},
  {id:'water',name:'Drink enough water',   icon:'💧',key:true},
  {id:'biz',  name:'Work on the business', icon:'🎮',key:true},
  {id:'mad',  name:'Check in w/ Madison',  icon:'👧',key:true},
  {id:'read', name:'Read daily',           icon:'📖',key:false},
  {id:'med',  name:'Meditate / breathe',   icon:'🧘',key:false},
  {id:'fit',  name:'Exercise',             icon:'💪',key:false},
];
const MENTAL=['Anxiety','Focus','Stress','Motivation','Confidence','Clarity','Gratitude','Energy'];
const MCOL={Anxiety:'#c43030',Focus:'#4a9eff',Stress:'#D35B2C',Motivation:'#028A48',Confidence:'#c8a800',Clarity:'#7B2FBE',Gratitude:'#ff69b4',Energy:'#00cc88'};
const PROMPTS=[
  "What's one thing you're building today that will matter in 6 months?",
  "If today were your last productive day this week, what would you focus?",
  "What's been blocking you and how will you push through it today?",
  "Who is Taevon becoming today? Describe him.",
  "What's one small win you can guarantee yourself before the day ends?",
  "What would the most disciplined version of you do in the next 3 hours?",
  "What's one thing you've been putting off that you'll handle today?",
  "If someone filmed your day today, would you be proud of what they'd see?",
  "What does forward progress look like specifically today?",
  "What's one thing you can do today that future-you will thank you for?",
  "Where did yesterday's energy go? Where is today's going?",
  "What closes the gap between where you are and where you want to be?",
  "Name one thing that's working. Name one thing to fix. Go.",
  "What would winning today look like — specifically?",
  "You woke up. Nobody knows how hard this season is. What do you do with that?",
];
const OPPS=[
  {t:'Send DCist outreach email',e:'Free press = thousands of players',a:'tips@dcist.com — use the transit angle from your press kit',c:'business'},
  {t:'Submit to Product Hunt',e:'Potential thousands of new users today',a:'producthunt.com — submit guessgame.shop',c:'business'},
  {t:'Brief Emmanuel on sponsor pitch',e:'$75+ first sponsor check',a:'Show him the one-pager — send him to a bar near Metro',c:'quick'},
  {t:'Complete 2-3 Prolific studies',e:'$3–25 in your pocket today',a:'prolific.com — filter for studies under 15 min',c:'remote'},
  {t:'Post first Reel to @nixalergames',e:'Audience growth = future revenue',a:'Screen record the game — caption: "Can you guess it?"',c:'platform'},
  {t:'DM 5 DC Instagram accounts',e:'Organic reach + potential press',a:'Search DC transit/lifestyle accounts — DM each one',c:'platform'},
  {t:'Reply to Lime with written statement',e:'Keeps your injury claim active',a:'Email Martyna — written only, no phone call',c:'quick'},
  {t:'Add legal page to guessgame.shop',e:'Legitimizes the business for sponsors',a:'Copy the ToS + Privacy HTML into your site',c:'business'},
  {t:'Set up Ko-fi on guessgame.shop',e:'Passive income from players who want to support',a:'kofi.com — create free page — embed button',c:'quick'},
  {t:'Research DC apartments for September',e:'Housing secured = stability',a:'Zillow/Apartments.com — DC/PG County — Sept move-in',c:'quick'},
  {t:'Post family & friends support message',e:'First player surge + donations',a:'The message is drafted — post to all your socials now',c:'platform'},
  {t:'Write 3 tweets about TheGuessingGame',e:'Organic reach + brand awareness',a:'Tweet a stat, a behind-the-scenes, and a player challenge',c:'platform'},
  {t:'Send GGWash outreach email',e:'Transit audience = perfect players',a:'ggwash.org contact form — transit angle pitch',c:'business'},
  {t:'Research NBA mode data structure',e:'NBA mode = sports audience',a:'Draft team data: conference, division, arena, founded year',c:'business'},
  {t:'Update your HQ sponsor pipeline',e:'Organization = momentum',a:'Log every contact made, every status change',c:'quick'},
  {t:'Open a Fidelity brokerage account',e:'Anthropic + SpaceX IPO opportunity',a:'fidelity.com — free account — ready before IPO',c:'remote'},
  {t:'Outline a NYC subway game pack',e:'City packs = $2.99 paid DLC',a:'Research MTA stations — zone, line, busyness data',c:'business'},
  {t:'Check Courial app — track toward 10 orders',e:'Unlock your pending Courial payouts',a:'Open Courial — see order count — plan next session',c:'platform'},
  {t:'Create a NiXalerGames TikTok',e:'TikTok has massive puzzle/game audience',a:'@nixalergames — post the gameplay demo video today',c:'platform'},
  {t:'Answer 3 Prolific back to back',e:'Stack $10–30 in one sitting from bed',a:'prolific.com — filter short studies — go',c:'remote'},
];
const DEF_SPONSORS=[
  {id:1,name:'Bar near Dupont Circle Metro',type:'Bar / Restaurant',status:'lead',notes:''},
  {id:2,name:'Bar near U Street / Cardozo',type:'Bar / Restaurant',status:'lead',notes:''},
  {id:3,name:'Compass Coffee DC',type:'Coffee Shop',status:'lead',notes:''},
  {id:4,name:'Capital Bikeshare',type:'Transit / Mobility',status:'lead',notes:''},
  {id:5,name:'Lime DC',type:'Transit / Mobility',status:'lead',notes:''},
  {id:6,name:'WMATA Partnerships',type:'Transit Authority',status:'lead',notes:''},
];
const DEF_PRESS=[
  {id:1,name:'Greater Greater Washington',contact:'ggwash.org',status:'unsent',notes:''},
  {id:2,name:'DCist',contact:'tips@dcist.com',status:'unsent',notes:''},
  {id:3,name:'Axios DC',contact:'dc@axios.com',status:'unsent',notes:''},
  {id:4,name:'Washington City Paper',contact:'Contact form',status:'unsent',notes:''},
  {id:5,name:'PoPville',contact:'Contact form',status:'unsent',notes:''},
];
const DEF_MIL=[
  {id:1,text:'Close first paying sponsor',val:'$75',done:false},
  {id:2,text:'Hit 100 daily players',val:'100 players',done:false},
  {id:3,text:'Apartment secured',val:'Sept 2026',done:false},
  {id:4,text:'Vehicle acquired',val:'After apt',done:false},
  {id:5,text:'Foot fully healed',val:'Recovery',done:false},
  {id:6,text:'First $1k revenue month',val:'$1k/mo',done:false},
  {id:7,text:'Hit 1,000 daily players',val:'1k players',done:false},
  {id:8,text:'Hit $3,000 MRR',val:'$3k MRR',done:false},
];
const DEF_EVENTS=[
  {id:1,title:'Doctor follow-up — foot',date:'',type:'health',notes:'~2 weeks from injury'},
  {id:2,title:'Secure apartment',date:'2026-09-01',type:'housing',notes:'September hard deadline'},
  {id:3,title:'Vehicle — plan + save',date:'',type:'housing',notes:'After apartment secured'},
  {id:4,title:'PWC court — check status',date:'',type:'legal',notes:'Follow up with public defender'},
  {id:5,title:'Florida FTA warrant',date:'',type:'legal',notes:'Needs resolution'},
  {id:6,title:'Glasses replacement',date:'',type:'health',notes:''},
  {id:7,title:'Tooth — needs pulling',date:'',type:'health',notes:''},
  {id:8,title:'Annual physical / checkup',date:'',type:'health',notes:''},
];
const SPLBL={lead:'Lead',out:'Reached Out',meeting:'In Talks',closed:'Closed ✓',declined:'Declined'};
const PRLBL={unsent:'Not Sent',sent:'Sent',responded:'Responded',published:'Published ✓',passed:'Passed'};
const STCOL={lead:'#555',out:'#4a9eff',meeting:'#c8a800',closed:'#028A48',declined:'#c43030',unsent:'#555',sent:'#4a9eff',responded:'#c8a800',published:'#028A48',passed:'#c43030'};

// ─── State ─────────────────────────────────────────────────────────────────
let S={};
let tab='today';
let F={
  mood:5,ms:{},trigger:'',jans:'',ints:['','',''],
  win:'',emood:5,refl:'',
  sleep:'',water:0,mealinput:'',meals:[],pain:0,showpain:false,
  incamt:'',incsrc:'DoorDash',expamt:'',expcat:'Food',expnote:'',
  opensp:null,openpr:null,openev:null,
};

function load(){
  try{const d=localStorage.getItem('taehq2');if(d)S=JSON.parse(d);}catch(e){}
  if(!S.ci)S.ci={};
  if(!S.moodlog)S.moodlog=[];
  if(!S.hlog)S.hlog={};
  if(!S.hablog)S.hablog={};
  if(!S.inclog)S.inclog=[];
  if(!S.explog)S.explog=[];
  if(!S.rev)S.rev=[];
  if(!S.wins)S.wins=[];
  if(!S.sponsors)S.sponsors=JSON.parse(JSON.stringify(DEF_SPONSORS));
  if(!S.press)S.press=JSON.parse(JSON.stringify(DEF_PRESS));
  if(!S.mil)S.mil=JSON.parse(JSON.stringify(DEF_MIL));
  if(!S.events)S.events=JSON.parse(JSON.stringify(DEF_EVENTS));
}
function save(){try{localStorage.setItem('taehq2',JSON.stringify(S));}catch(e){}}

// ─── Helpers ───────────────────────────────────────────────────────────────
const tod=()=>new Date().toISOString().slice(0,10);
const f$=n=>n>=1000?'$'+(n/1000).toFixed(1)+'k':'$'+Math.round(n);
const ci=()=>S.ci[tod()]||{};
const hl=()=>S.hablog[tod()]||{};
const keys=()=>HABITS.filter(h=>h.key);
const monthInc=()=>S.inclog.filter(r=>r.date&&r.date.slice(0,7)===tod().slice(0,7)).reduce((s,r)=>s+parseFloat(r.amount||0),0);
function score(){
  const c=ci(),h=hl(),k=keys();
  const hd=k.filter(x=>h[x.id]).length;
  return Math.round(Math.min(100,(c.md?20:0)+(c.jd?15:0)+(hd/k.length*35)+(c.ed?20:0)+(c.win?10:0)));
}
function streak(id){
  let s=0;const d=new Date();
  for(let i=0;i<200;i++){
    const k=d.toISOString().slice(0,10);
    if(S.hablog[k]&&S.hablog[k][id])s++;else break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
function dOpps(){
  const n=new Date().getDate();
  const out=[];
  for(let i=0;i<5;i++)out.push(OPPS[(n*3+i)%OPPS.length]);
  return out;
}
function e(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function pct(v,mx){return Math.min(100,mx>0?(v/mx)*100:0).toFixed(0)}

// ─── Render ────────────────────────────────────────────────────────────────
function render(){
  const c=document.getElementById('content');
  if(!c)return;
  const fns={today:rToday,mind:rMind,body:rBody,money:rMoney,build:rBuild};
  c.innerHTML=(fns[tab]||rToday)();
  // header
  const sc=score();
  const sel=document.getElementById('score-el');
  if(sel){sel.textContent=sc;sel.style.color=sc>=80?'var(--green)':sc>=50?'var(--yellow)':'var(--red)';}
  const de=document.getElementById('hdr-date');
  if(de)de.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}).toUpperCase();
  // nav
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
}

// ─── TODAY ─────────────────────────────────────────────────────────────────
function rToday(){
  const c=ci(),h=hl(),k=keys(),sc=score();
  const scol=sc>=80?'var(--green)':sc>=50?'var(--yellow)':'var(--red)';
  const prompt=PROMPTS[new Date().getDate()%PROMPTS.length];
  const chips=[['☀️ Morning',c.md],['📝 Journal',c.jd],['🔥 Habits',k.filter(x=>h[x.id]).length===k.length&&k.length>0],['🌙 Evening',c.ed],['🏆 Win',!!c.win]];

  const morn=c.md
    ?`<div style="color:var(--green);font-size:11px;margin-bottom:6px">✓ Done · Mood ${c.mood}/10</div>${(c.ints||[]).filter(Boolean).map(i=>`<div style="font-size:11px;color:var(--txt2);line-height:1.8">→ ${e(i)}</div>`).join('')}`
    :`<div style="font-size:10px;color:var(--txt3);margin-bottom:5px">Mood right now · <span id="mv" style="color:var(--accent);font-weight:700">${F.mood}/10</span></div>
<input type="range" min="1" max="10" value="${F.mood}" style="accent-color:var(--accent);margin-bottom:12px" oninput="F.mood=+this.value;document.getElementById('mv').textContent=this.value+'/10'">
<div style="font-size:10px;color:var(--txt3);margin-bottom:6px">Top 3 intentions for today</div>
<input class="inp row-gap" placeholder="Intention 1..." value="${e(F.ints[0])}" oninput="F.ints[0]=this.value">
<input class="inp row-gap" placeholder="Intention 2..." value="${e(F.ints[1])}" oninput="F.ints[1]=this.value">
<input class="inp" placeholder="Intention 3..." value="${e(F.ints[2])}" oninput="F.ints[2]=this.value" style="margin-bottom:12px">
<button class="btn btn-full" style="background:var(--accent);color:#fff" onclick="saveMorn()">SAVE MORNING →</button>`;

  const journ=c.jd
    ?`<div style="font-size:11px;color:var(--txt2);line-height:1.7;font-style:italic">"${e(c.jans)}"</div>`
    :`<textarea class="inp" rows="3" placeholder="Your answer..." oninput="F.jans=this.value" style="margin-bottom:8px">${e(F.jans)}</textarea>
<button class="btn btn-full" style="background:var(--purple);color:#fff" onclick="saveJourn()">SAVE JOURNAL</button>`;

  const habRows=k.map(hb=>{
    const d=!!h[hb.id];const s=streak(hb.id);
    return`<div class="chk-row" onclick="togHab('${hb.id}')"><div class="chk-box${d?' done':''}">✓</div><span class="chk-lbl${d?' done':''}">${hb.icon} ${hb.name}</span>${s>0?`<span style="font-size:9px;color:var(--yellow);font-weight:700">${s}🔥</span>`:''}</div>`;
  }).join('');

  const opps=dOpps().map(op=>{
    const cc={business:'#028A48',remote:'#4a9eff',quick:'#c8a800',platform:'#D35B2C'}[op.c]||'#4a9eff';
    return`<div style="background:var(--card2);border:1px solid ${cc}33;border-radius:8px;padding:12px;margin-bottom:8px">
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
<div style="font-size:12px;font-weight:700;flex:1;padding-right:8px">${e(op.t)}</div>
<span class="pill" style="background:${cc}22;color:${cc};border:1px solid ${cc}44;flex-shrink:0">${op.c.toUpperCase()}</span>
</div>
<div style="font-size:10px;color:var(--yellow);font-weight:700;margin-bottom:3px">${e(op.e)}</div>
<div style="font-size:10px;color:var(--txt2);line-height:1.6">${e(op.a)}</div>
</div>`;
  }).join('');

  const eve=c.ed
    ?`<div style="color:var(--green);font-size:11px;margin-bottom:4px">✓ Done · Mood ${c.emood}/10</div>${c.win?`<div style="font-size:11px;color:var(--yellow);font-weight:700">🏆 ${e(c.win)}</div>`:''}`
    :`<div style="font-size:10px;color:var(--txt3);margin-bottom:5px">End of day mood · <span id="ev" style="color:var(--purple);font-weight:700">${F.emood}/10</span></div>
<input type="range" min="1" max="10" value="${F.emood}" style="accent-color:var(--purple);margin-bottom:10px" oninput="F.emood=+this.value;document.getElementById('ev').textContent=this.value+'/10'">
<input class="inp" placeholder="Today's win — even a small one..." value="${e(F.win)}" oninput="F.win=this.value" style="margin-bottom:8px">
<textarea class="inp" rows="2" placeholder="Anything to remember from today..." oninput="F.refl=this.value" style="margin-bottom:8px">${e(F.refl)}</textarea>
<button class="btn btn-full" style="background:var(--purple);color:#fff" onclick="saveEve()">SAVE EVENING →</button>`;

  return`
<div class="card">
<span class="slbl">ACCOUNTABILITY · <span style="color:${scol}">${sc}/100</span></span>
<div class="pbar" style="height:8px"><div class="pbar-fill" style="width:${sc}%;height:100%;background:${scol}"></div></div>
<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px">
${chips.map(([l,d])=>`<div style="background:${d?'rgba(2,138,72,.2)':'rgba(0,0,0,.03)'};border:1px solid ${d?'var(--green)':'var(--border)'};color:${d?'var(--green)':'var(--txt3)'};font-weight:${d?700:400};border-radius:6px;padding:3px 8px;font-size:9px">${l}</div>`).join('')}
</div>
</div>
<div class="card"><span class="slbl" style="color:var(--accent)">☀️ MORNING CHECK-IN</span>${morn}</div>
<div class="card">
<span class="slbl" style="color:var(--purple)">📝 TODAY'S PROMPT</span>
<div style="font-size:13px;font-weight:700;line-height:1.5;margin-bottom:12px">"${prompt}"</div>
${journ}
</div>
<div class="card"><span class="slbl" style="color:var(--green)">🔥 HABITS TODAY</span>${habRows}</div>
<div class="card">
<span class="slbl" style="color:var(--yellow)">⚡ TODAY'S OPPORTUNITIES</span>
<div style="font-size:9px;color:var(--txt3);margin-bottom:10px">Refreshes daily · Built for your situation</div>
${opps}
</div>
<div class="card"><span class="slbl" style="color:var(--purple)">🌙 EVENING REFLECTION</span>${eve}</div>`;
}

// ─── MIND ──────────────────────────────────────────────────────────────────
function rMind(){
  const sliders=MENTAL.map(s=>{
    const v=F.ms[s]||5;const col=MCOL[s];
    return`<div style="margin-bottom:10px">

// ─── Handlers ─────────────────────────────────────────────────────────────
function saveMorn(){if(!S.ci[tod()])S.ci[tod()]={};Object.assign(S.ci[tod()],{md:true,mood:F.mood,ints:[...F.ints]});save();render();}
function saveJourn(){if(!S.ci[tod()])S.ci[tod()]={};Object.assign(S.ci[tod()],{jd:!!F.jans.trim(),jans:F.jans});save();render();}
function saveEve(){
  if(!S.ci[tod()])S.ci[tod()]={};
  Object.assign(S.ci[tod()],{ed:true,emood:F.emood,refl:F.refl,win:F.win});
  if(F.win.trim())S.wins=[{text:F.win,date:tod(),id:Date.now()},...(S.wins||[])];
  save();render();
}
function togHab(id){if(!S.hablog[tod()])S.hablog[tod()]={};S.hablog[tod()][id]=!S.hablog[tod()][id];save();render();}
function logMood(){S.moodlog.push({date:tod(),mood:F.mood,ms:{...F.ms},trigger:F.trigger});F.trigger='';save();render();}
function logSleep(){if(!S.hlog[tod()])S.hlog[tod()]={};S.hlog[tod()].sleep=parseFloat(F.sleep)||0;save();render();}
function adjWater(d){F.water=Math.max(0,F.water+d);render();}
function logWater(){if(!S.hlog[tod()])S.hlog[tod()]={};S.hlog[tod()].water=F.water;save();render();}
function addMeal(){if(!F.mealinput.trim())return;if(!F.meals)F.meals=[];F.meals.push(F.mealinput);F.mealinput='';render();}
function saveMeals(){if(!S.hlog[tod()])S.hlog[tod()]={};S.hlog[tod()].meals=[...F.meals];save();render();}
function logPain(){if(!S.hlog[tod()])S.hlog[tod()]={};S.hlog[tod()].pain=F.pain;F.showpain=false;save();render();}
function logInc(){if(!F.incamt)return;S.inclog.push({id:Date.now(),amount:parseFloat(F.incamt),source:F.incsrc,date:tod()});F.incamt='';save();render();}
function logExp(){if(!F.expamt)return;S.explog.push({id:Date.now(),amount:parseFloat(F.expamt),category:F.expcat,note:F.expnote,date:tod()});F.expamt='';F.expnote='';save();render();}
function logRev(){const a=parseFloat(document.getElementById('ra')?.value);const s=document.getElementById('rs')?.value;if(!a||!s)return;S.rev.push({id:Date.now(),amount:a,source:s,date:tod()});save();render();}
function setSpSt(id,st){S.sponsors=S.sponsors.map(s=>s.id===id?{...s,status:st}:s);save();render();}
function spNote(id,v){S.sponsors=S.sponsors.map(s=>s.id===id?{...s,notes:v}:s);save();}
function setPrSt(id,st){S.press=S.press.map(p=>p.id===id?{...p,status:st}:p);save();render();}
function prNote(id,v){S.press=S.press.map(p=>p.id===id?{...p,notes:v}:p);save();}
function togMil(id){S.mil=S.mil.map(m=>m.id===id?{...m,done:!m.done}:m);save();render();}
function evDate(id,v){S.events=S.events.map(ev=>ev.id===id?{...ev,date:v}:ev);save();}
function evNote(id,v){S.events=S.events.map(ev=>ev.id===id?{...ev,notes:v}:ev);save();}
function switchTab(t){tab=t;F.opensp=null;F.openpr=null;F.openev=null;render();}

// ─── Init ──────────────────────────────────────────────────────────────────
// Stripe
const strEl=document.getElementById('stripe');
STRIPES.forEach(c=>{const d=document.createElement('div');d.style.cssText=`flex:1;background:${c}`;strEl.appendChild(d);});
// Nav
const navEl=document.getElementById('nav');
[{id:'today',icon:'⚡',lbl:'Today'},{id:'mind',icon:'🧠',lbl:'Mind'},{id:'body',icon:'💪',lbl:'Body'},{id:'money',icon:'💰',lbl:'Money'},{id:'build',icon:'🎯',lbl:'Build'}].forEach(t=>{
  const b=document.createElement('button');
  b.className='nav-btn'+(t.id===tab?' active':'');
  b.dataset.tab=t.id;
  b.innerHTML=`<span class="nav-icon">${t.icon}</span><span class="nav-lbl">${t.lbl}</span>`;
  b.onclick=()=>switchTab(t.id);
  navEl.appendChild(b);
});
load();
render();
</script>
</body>
